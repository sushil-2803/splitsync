services:
  postgres:
    image: postgres:16-alpine
    container_name: splitsync-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-splitsync}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5435:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    container_name: splitsync-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5435/${POSTGRES_DB:-splitsync}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    ports:
      - "3003:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Frontend/Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3003}
    container_name: splitsync-frontend
    ports:
      - "5003:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data: